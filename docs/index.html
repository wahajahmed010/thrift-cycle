<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrift-Cycle Predictor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#0a0a0f;color:#e0e0e6;min-height:100vh}
.container{max-width:1200px;margin:0 auto;padding:20px}
header{text-align:center;padding:40px 0 30px;border-bottom:1px solid #1a1a2e;margin-bottom:30px}
header h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#ff6b35,#f7c948);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header p{color:#888;margin-top:8px;font-size:.95rem}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:30px}
.stat-card{background:#12121a;border:1px solid #1e1e2e;border-radius:12px;padding:16px;text-align:center}
.stat-card .value{font-size:1.6rem;font-weight:700}
.stat-card .label{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.hot .value{color:#ff6b35}.warm .value{color:#f7c948}.cold .value{color:#4a9eff}.margin-color .value{color:#2ecc71}
.filters{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filters button{background:#1a1a2e;border:1px solid #2a2a3e;color:#aaa;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:all .2s}
.filters button:hover,.filters button.active{background:#2a2a3e;color:#fff;border-color:#4a4a6e}
.filters button.active-hot{background:#3a1a0a;color:#ff6b35;border-color:#ff6b35}
.filters button.active-warm{background:#3a2a0a;color:#f7c948;border-color:#f7c948}
.filters button.active-cold{background:#0a1a3a;color:#4a9eff;border-color:#4a9eff}
.filters select{background:#1a1a2e;border:1px solid #2a2a3e;color:#ccc;padding:8px 12px;border-radius:8px;font-size:.85rem}
.brand-group{margin-bottom:24px;border:1px solid #1e1e2e;border-radius:12px;overflow:hidden}
.brand-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;background:#12121a;cursor:pointer;user-select:none}
.brand-header:hover{background:#16162a}
.brand-name{font-size:1.1rem;font-weight:700;display:flex;align-items:center;gap:10px}
.brand-name .emoji{font-size:1.3rem}
.brand-stats{display:flex;gap:16px;font-size:.8rem;color:#888}
.brand-stats span{display:flex;align-items:center;gap:4px}
.brand-body{display:none}
.brand-body.open{display:block}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{position:sticky;top:0;background:#0d0d18;padding:10px 8px;text-align:left;color:#888;font-weight:600;text-transform:uppercase;font-size:.7rem;letter-spacing:.05em;border-bottom:1px solid #1e1e2e;cursor:pointer}
thead th:hover{color:#fff}
tbody tr{border-bottom:1px solid #111120;transition:background .15s}
tbody tr:hover{background:#14142a}
tbody td{padding:8px}
.band{display:inline-block;padding:2px 8px;border-radius:4px;font-size:.72rem;font-weight:600}
.band-HOT{background:#3a1a0a;color:#ff6b35}.band-WARM{background:#3a2a0a;color:#f7c948}.band-COLD{background:#0a1a3a;color:#4a9eff}
.trend{font-size:1rem}.trend-up{color:#2ecc71}.trend-down{color:#e74c3c}.trend-flat{color:#888}
.roi-good{color:#2ecc71;font-weight:600}.roi-mid{color:#f7c948}.roi-low{color:#888}
.marketplace{font-size:.72rem;padding:2px 6px;border-radius:3px;background:#1a1a2e;color:#aaa}
.marketplace-de{border-left:2px solid #ff6b35}.marketplace-us{border-left:2px solid #4a9eff}
.best-roi{color:#2ecc71;font-weight:700;font-size:.8rem}
footer{text-align:center;padding:40px 0 20px;color:#555;font-size:.8rem}
footer a{color:#888;text-decoration:none}footer a:hover{color:#fff}
.empty{text-align:center;padding:60px;color:#555}
@media(max-width:768px){.container{padding:10px}header h1{font-size:1.5rem}table{font-size:.72rem}thead th,tbody td{padding:5px 3px}.stats-row{grid-template-columns:repeat(2,1fr)}.brand-stats{flex-direction:column;gap:4px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🦌 Thrift-Cycle Predictor</h1>
    <p>eBay DE + US resale intelligence — sell-through rates, Fleek margins &amp; trends</p>
    <p id="date"></p>
  </header>
  <div class="stats-row" id="stats"></div>
  <div class="filters">
    <button onclick="filter('all')" class="active" id="btn-all">All</button>
    <button onclick="filter('HOT')" id="btn-HOT">🔥 Hot</button>
    <button onclick="filter('WARM')" id="btn-WARM">🌡️ Warm</button>
    <button onclick="filter('COLD')" id="btn-COLD">❄️ Cold</button>
    <span style="color:#555">|</span>
    <select id="market-filter" onchange="applyFilters()"><option value="all">All Markets</option><option value="de">🇩🇪 DE Only</option><option value="us">🇺🇸 US Only</option></select>
    <span style="color:#555">|</span>
    <button onclick="sortBy('roi')" id="btn-roi">💰 ROI</button>
    <button onclick="sortBy('str')" id="btn-str">📊 STR</button>
    <button onclick="sortBy('margin')" id="btn-margin">💶 Margin</button>
    <button onclick="toggleAll()" id="btn-toggle">▼ Expand All</button>
  </div>
  <div id="groups"></div>
  <div class="empty" id="empty" style="display:none">No data yet. Run the pipeline first.</div>
  <footer>
    <p>Thrift-Cycle Predictor — <a href="https://github.com/wahajahmed010/thrift-cycle">GitHub</a></p>
    <p>Data: eBay Browse API + Fleek wholesale pricing | Updated daily</p>
  </footer>
</div>
<script src="data.js"></script>
<script>
let DATA = [];
let currentFilter = 'all';
let currentMarket = 'all';
let currentSort = { field: 'roi', dir: 'desc' };
let allExpanded = false;

// Brand groupings (like Fleek categories)
const BRAND_GROUPS = [
  { name: "Birkenstock", emoji: "🩴", keywords: ["Birkenstock"] },
  { name: "Hiking Boots", emoji: "🥾", keywords: ["Lowa", "Meindl"] },
  { name: "Outdoor Gear", emoji: "🎒", keywords: ["Ortlieb", "Deuter", "Vaude", "Jack Wolfskin"] },
  { name: "Patagonia", emoji: "🏔️", keywords: ["Patagonia"] },
  { name: "Arc'teryx", emoji: "🧗", keywords: ["Arc'teryx"] },
  { name: "Levi's & Vintage Denim", emoji: "👖", keywords: ["Levi's", "Vintage Levi's"] },
  { name: "Designer Shoes", emoji: "👠", keywords: ["Chanel", "Miu Miu", "Repetto", "Tory Burch"] },
  { name: "Premium Brands", emoji: "👔", keywords: ["Ralph Lauren", "Tommy Hilfiger", "Lululemon"] },
];

function loadData() {
  if (typeof PIPELINE_DATA !== 'undefined') {
    DATA = PIPELINE_DATA.results || [];
    document.getElementById('date').textContent = 'Updated: ' + PIPELINE_DATA.date;
  }
  if (DATA.length === 0) { document.getElementById('empty').style.display = 'block'; return; }
  render();
}

function groupItems(items) {
  const groups = [];
  const assigned = new Set();
  for (const bg of BRAND_GROUPS) {
    const groupItems = items.filter(i => bg.keywords.some(k => i.keyword.includes(k)));
    if (groupItems.length > 0) {
      groups.push({ ...bg, items: groupItems });
      groupItems.forEach(i => assigned.add(i.keyword + '|' + i.marketplace));
    }
  }
  const ungrouped = items.filter(i => !assigned.has(i.keyword + '|' + i.marketplace));
  if (ungrouped.length > 0) groups.push({ name: "Other", emoji: "📦", items: ungrouped });
  return groups;
}

function getStr(item) {
  return item.active > 0 ? (item.sold / (item.sold + item.active) * 100) : 0;
}

function getGroupBestRoi(items) {
  const withRoi = items.filter(i => i.roi && i.roi > 0);
  if (withRoi.length === 0) return null;
  return withRoi.reduce((best, i) => i.roi > best.roi ? i : best, withRoi[0]);
}

function getGroupAvgStr(items) {
  return items.reduce((sum, i) => sum + getStr(i), 0) / items.length;
}

function getSortValue(item, field) {
  switch(field) {
    case 'str': return getStr(item);
    case 'sellability': return item.sellability || 0;
    case 'roi': return item.roi || 0;
    case 'margin': return item.margin || 0;
    case 'avg_price': return item.avg_price || 0;
    case 'active': return item.active || 0;
    case 'sold': return item.sold || 0;
    case 'fleek_cost': return item.fleek_cost || 0;
    case 'keyword': return item.keyword || '';
    default: return 0;
  }
}

function sortItems(items) {
  return [...items].sort((a, b) => {
    const va = getSortValue(a, currentSort.field);
    const vb = getSortValue(b, currentSort.field);
    if (typeof va === 'string') return currentSort.dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    return currentSort.dir === 'desc' ? vb - va : va - vb;
  });
}

function render() { renderStats(); renderGroups(); }

function renderStats() {
  const hot = DATA.filter(i => i.band === 'HOT').length;
  const warm = DATA.filter(i => i.band === 'WARM').length;
  const cold = DATA.filter(i => i.band === 'COLD').length;
  const withMargin = DATA.filter(i => i.margin && i.margin > 0).length;
  const bestItem = DATA.reduce((best, i) => (i.roi || 0) > (best.roi || 0) ? i : best, DATA[0]);
  const avgSTR = DATA.reduce((sum, i) => sum + getStr(i), 0) / DATA.length;
  document.getElementById('stats').innerHTML =
    '<div class="stat-card hot"><div class="value">' + hot + '</div><div class="label">🔥 Hot</div></div>' +
    '<div class="stat-card warm"><div class="value">' + warm + '</div><div class="label">🌡️ Warm</div></div>' +
    '<div class="stat-card cold"><div class="value">' + cold + '</div><div class="label">❄️ Cold</div></div>' +
    '<div class="stat-card"><div class="value">' + DATA.length + '</div><div class="label">Items</div></div>' +
    '<div class="stat-card margin-color"><div class="value">' + withMargin + '</div><div class="label">💰 Margins</div></div>' +
    '<div class="stat-card"><div class="value">' + avgSTR.toFixed(1) + '%</div><div class="label">Avg STR</div></div>';
}

function renderGroups() {
  let filtered = DATA;
  if (currentFilter !== 'all') filtered = filtered.filter(i => i.band === currentFilter);
  if (currentMarket !== 'all') filtered = filtered.filter(i => i.marketplace === currentMarket);
  
  const groups = groupItems(filtered);
  const container = document.getElementById('groups');
  container.innerHTML = groups.map((g, gi) => {
    const sorted = sortItems(g.items);
    const bestRoi = getGroupBestRoi(sorted);
    const avgStr = getGroupAvgStr(sorted).toFixed(1);
    const avgMargin = sorted.filter(i => i.margin > 0).reduce((s, i) => s + i.margin, 0) / Math.max(1, sorted.filter(i => i.margin > 0).length);
    const bestStr = bestRoi ? 'Best: ' + bestRoi.keyword + ' ' + Math.round(bestRoi.roi) + '% ROI' : '';
    return '<div class="brand-group" id="group-' + gi + '">' +
      '<div class="brand-header" onclick="toggleGroup(' + gi + ')">' +
        '<div class="brand-name"><span class="emoji">' + g.emoji + '</span>' + g.name + ' <span style="color:#555;font-size:.8rem">(' + sorted.length + ')</span></div>' +
        '<div class="brand-stats">' +
          '<span>STR ' + avgStr + '%</span>' +
          (avgMargin > 0 ? '<span>€' + Math.round(avgMargin) + ' avg margin</span>' : '') +
          (bestRoi ? '<span class="best-roi">🔥 ' + bestRoi.roi.toFixed(0) + '% ROI</span>' : '') +
        '</div>' +
      '</div>' +
      '<div class="brand-body" id="body-' + gi + '">' +
        '<table><thead><tr>' +
          '<th onclick="sortBy(\'keyword\')">Item</th>' +
          '<th>Mkt</th><th>Band</th><th onclick="sortBy(\'str\')">STR</th>' +
          '<th onclick="sortBy(\'avg_price\')">Sold</th><th>Active</th><th>Sold</th>' +
          '<th onclick="sortBy(\'fleek_cost\')">Cost</th><th onclick="sortBy(\'margin\')">Margin</th>' +
          '<th onclick="sortBy(\'roi\')">ROI</th>' +
        '</tr></thead><tbody>' +
        sorted.map(i => {
          const str = getStr(i).toFixed(1);
          const mktClass = i.marketplace === 'de' ? 'marketplace-de' : 'marketplace-us';
          const roiClass = (i.roi||0) >= 200 ? 'roi-good' : (i.roi||0) >= 50 ? 'roi-mid' : 'roi-low';
          const cost = i.fleek_cost ? '$' + i.fleek_cost.toFixed(0) : '—';
          const margin = i.margin ? '€' + i.margin.toFixed(0) : '—';
          const roi = i.roi ? i.roi.toFixed(0) + '%' : '—';
          return '<tr><td><strong>' + i.keyword + '</strong></td>' +
            '<td><span class="marketplace ' + mktClass + '">' + i.marketplace.toUpperCase() + '</span></td>' +
            '<td><span class="band band-' + i.band + '">' + i.band + '</span></td>' +
            '<td>' + str + '%</td>' +
            '<td>€' + (i.avg_price||0).toFixed(0) + '</td><td>' + (i.active||0) + '</td><td>' + (i.sold||0) + '</td>' +
            '<td>' + cost + '</td><td>' + margin + '</td><td class="' + roiClass + '">' + roi + '</td></tr>';
        }).join('') +
        '</tbody></table></div></div>';
  }).join('');
}

function toggleGroup(i) {
  const body = document.getElementById('body-' + i);
  body.classList.toggle('open');
}

function toggleAll() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.brand-body').forEach(b => {
    if (allExpanded) b.classList.add('open');
    else b.classList.remove('open');
  });
  document.getElementById('btn-toggle').textContent = allExpanded ? '▼ Collapse All' : '▼ Expand All';
}

function filter(band) {
  currentFilter = band;
  document.querySelectorAll('.filters button[id^="btn-"]').forEach(b => b.className = '');
  const btn = document.getElementById('btn-' + band);
  if (band === 'all') btn.className = 'active';
  else if (band === 'HOT') btn.className = 'active-hot';
  else if (band === 'WARM') btn.className = 'active-warm';
  else if (band === 'COLD') btn.className = 'active-cold';
  currentMarket = document.getElementById('market-filter').value;
  render();
  if (allExpanded) document.querySelectorAll('.brand-body').forEach(b => b.classList.add('open'));
}

function applyFilters() {
  currentMarket = document.getElementById('market-filter').value;
  render();
  if (allExpanded) document.querySelectorAll('.brand-body').forEach(b => b.classList.add('open'));
}

function sortBy(field) {
  if (currentSort.field === field) currentSort.dir = currentSort.dir === 'desc' ? 'asc' : 'desc';
  else { currentSort.field = field; currentSort.dir = 'desc'; }
  render();
  if (allExpanded) document.querySelectorAll('.brand-body').forEach(b => b.classList.add('open'));
}

loadData();
</script>
</body>
</html>
